name: Actions Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Print runner info
        run: |
          echo "runner started"
          uname -a
      - name: Print event context
        run: |
          echo "repository=${GITHUB_REPOSITORY}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
